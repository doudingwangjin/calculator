<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Life Clock - 生命时钟</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div>
                <h1>生命时钟</h1>
                <p class="subtitle">每一秒都值得被珍视</p>
            </div>
            <button id="settings-btn" class="icon-btn" aria-label="设置">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </header>

        <main class="timers-container">
            <!-- 已经存活 -->
            <div class="card lived-card">
                <h2>你已来到这个世界</h2>
                <div class="timer" id="lived-timer">
                    <div class="time-block" style="--delay: 0.1s"><span class="number" id="l-y">0</span><span class="label">年</span></div>
                    <div class="time-block" style="--delay: 0.2s"><span class="number" id="l-m">0</span><span class="label">月</span></div>
                    <div class="time-block" style="--delay: 0.3s"><span class="number" id="l-d">0</span><span class="label">天</span></div>
                    <div class="time-block" style="--delay: 0.4s"><span class="number" id="l-h">0</span><span class="label">时</span></div>
                    <div class="time-block" style="--delay: 0.5s"><span class="number" id="l-min">0</span><span class="label">分</span></div>
                    <div class="time-block" style="--delay: 0.6s"><span class="number" id="l-s">0</span><span class="label">秒</span></div>
                </div>
            </div>

            <!-- 退休倒计时 -->
            <div class="card retire-card">
                <h2>距离退休还有</h2>
                <div class="timer" id="retire-timer">
                     <div class="time-block" style="--delay: 0.1s"><span class="number" id="r-y">0</span><span class="label">年</span></div>
                    <div class="time-block" style="--delay: 0.2s"><span class="number" id="r-m">0</span><span class="label">月</span></div>
                    <div class="time-block" style="--delay: 0.3s"><span class="number" id="r-d">0</span><span class="label">天</span></div>
                    <div class="time-block" style="--delay: 0.4s"><span class="number" id="r-h">0</span><span class="label">时</span></div>
                    <div class="time-block" style="--delay: 0.5s"><span class="number" id="r-min">0</span><span class="label">分</span></div>
                    <div class="time-block" style="--delay: 0.6s"><span class="number" id="r-s">0</span><span class="label">秒</span></div>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="retire-progress"></div></div>
                <p class="progress-label" id="retire-percentage">0%</p>
            </div>

            <!-- 生命倒计时 -->
            <div class="card life-card">
                <h2>生命倒计时</h2>
                <div class="timer" id="life-timer">
                     <div class="time-block" style="--delay: 0.1s"><span class="number" id="d-y">0</span><span class="label">年</span></div>
                    <div class="time-block" style="--delay: 0.2s"><span class="number" id="d-m">0</span><span class="label">月</span></div>
                    <div class="time-block" style="--delay: 0.3s"><span class="number" id="d-d">0</span><span class="label">天</span></div>
                    <div class="time-block" style="--delay: 0.4s"><span class="number" id="d-h">0</span><span class="label">时</span></div>
                    <div class="time-block" style="--delay: 0.5s"><span class="number" id="d-min">0</span><span class="label">分</span></div>
                    <div class="time-block" style="--delay: 0.6s"><span class="number" id="d-s">0</span><span class="label">秒</span></div>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="life-progress"></div></div>
                <p class="progress-label" id="life-percentage">0%</p>
            </div>
        </main>
    </div>

    <!-- Modal for settings -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>设置</h3>
                <button id="close-modal" class="icon-btn close-btn" aria-label="关闭">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>出生时间</label>
                    <input type="datetime-local" id="input-birth" value="1996-12-02T06:10">
                </div>
                <div class="form-group row-group">
                    <div class="col">
                        <label>退休年龄</label>
                        <input type="number" id="input-retire" value="63" min="1" max="150" inputmode="numeric">
                    </div>
                    <div class="col">
                        <label>期待寿命</label>
                        <input type="number" id="input-life" value="80" min="1" max="150" inputmode="numeric">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings" class="btn btn-primary">保存设置</button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
